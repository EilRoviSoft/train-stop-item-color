[shortcut-name]
color-train-stops=Color Train Stops

[item-name]
train-stop-color-tool=Train Stop Color Tool

[mod-setting-name]
train-stop-item-color-vibrance-push=Vibrance Push
train-stop-item-color-saturation-boost=Saturation Boost
train-stop-item-color-blend-item-colors=Blend Item Colors
use-color-from-pipes-for-fluids=Use predefined color of fluid from pipes
ignore-first-icon-in-train-stop-name=Ignore first icon in train stop name

[mod-setting-description]
train-stop-item-color-vibrance-push=How strongly colors are pushed away from grey; higher values produce more vivid, punchy colors.
train-stop-item-color-saturation-boost=Multiplier applied to color saturation; higher values increase color intensity.
train-stop-item-color-blend-item-colors=When enabled, colors from multiple item or fluid tags are averaged together. When disabled, only the first tag determines the train stop color.
